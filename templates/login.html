<!DOCTYPE html>
<html>
<head>
    <title>ProdOS Authentication</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-container {
            width: 800px;
            height: 500px;
            position: relative;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .form-container {
            position: absolute;
            top: 0;
            height: 100%;
            width: 50%;
            padding: 60px;
            transition: all 0.6s ease-in-out;
        }

        .login-container {
            left: 0;
            z-index: 2;
        }

        .register-container {
            left: 0;
            opacity: 0;
            z-index: 1;
        }

        .auth-container.right-active .login-container {
            transform: translateX(100%);
            opacity: 0;
        }

        .auth-container.right-active .register-container {
            transform: translateX(100%);
            opacity: 1;
            z-index: 5;
        }

        .overlay-container {
            position: absolute;
            top: 0;
            left: 50%;
            width: 50%;
            height: 100%;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: transform 0.6s ease-in-out;
            z-index: 10;
        }

        .auth-container.right-active .overlay-container {
            transform: translateX(-100%);
        }

        .btn-custom {
            background: white;
            border-radius: 20px;
            padding: 8px 25px;
            border: none;
        }

        input {
            border-radius: 10px !important;
        }
    </style>
</head>

<body>

<div class="auth-container" id="authContainer">

    <!-- LOGIN -->
    <div class="form-container login-container">
        <h3>Login</h3>
        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>
            <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
    </div>

    <!-- REGISTER -->
    <div class="form-container register-container">
        <h3>Create Account</h3>
        <form method="post" action="{% url 'register' %}">
            {% csrf_token %}

            <input type="text" name="full_name" class="form-control mb-3"
                placeholder="Full Name" required>

            <input type="email" name="email" class="form-control mb-3"
                placeholder="Email Address" required>

            <input type="text" name="username" class="form-control mb-3"
                placeholder="Username" required>

            <input type="password" name="password" class="form-control mb-3"
                placeholder="Create Password" required>

            <input type="password" name="confirm_password" class="form-control mb-3"
                placeholder="Confirm Password" required>

            <button type="submit" class="btn btn-success w-100">
                Register
            </button>
        </form>
    </div>

    <!-- OVERLAY -->
    <div class="overlay-container">
        <div>
            <h2 id="overlayTitle">New Here?</h2>
            <p id="overlayText">Create an account to start your productivity journey</p>
            <button class="btn-custom mt-3" onclick="toggleAuth()">
                Switch
            </button>
        </div>
    </div>

</div>

<script>
function toggleAuth() {
    const container = document.getElementById("authContainer");
    container.classList.toggle("right-active");

    const title = document.getElementById("overlayTitle");
    const text = document.getElementById("overlayText");

    if (container.classList.contains("right-active")) {
        title.innerText = "Already Have an Account?";
        text.innerText = "Login to continue managing your productivity";
    } else {
        title.innerText = "New Here?";
        text.innerText = "Create an account to start your productivity journey";
    }
}
</script>

</body>
</html>
