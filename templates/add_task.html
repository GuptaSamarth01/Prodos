<!DOCTYPE html>
<html>
<head>
    <title>Add Task - ProdOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/8f3c7c9e5a.js" crossorigin="anonymous"></script>

    <style>
        body {
            background: linear-gradient(135deg, #eef2f7, #d9e4f5);
            min-height: 100vh;
            transition: 0.3s ease;
        }

        .dark-mode {
            background: #1c1f26;
            color: white;
        }

        .form-card {
            border-radius: 20px;
            border: none;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }

        .dark-mode .form-card {
            background: #2a2f3a;
            color: white;
        }

        .form-header {
            background: linear-gradient(90deg, #1e3c72, #2a5298);
            color: white;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            padding: 20px;
        }

        .input-group-text {
            border-radius: 12px 0 0 12px;
        }

        .form-control, .form-select {
            border-radius: 0 12px 12px 0;
        }

        .btn-save {
            background: linear-gradient(90deg, #1e3c72, #2a5298);
            border: none;
            border-radius: 12px;
            padding: 10px 25px;
            transition: all 0.3s ease;
        }

        .btn-save:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 18px rgba(0,0,0,0.2);
        }

        .recurrence-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
        }

        .dark-mode .recurrence-box {
            background: #3a3f4a;
        }
    </style>
</head>

<body>

<div class="container py-4 text-end">
    <button class="btn btn-sm btn-outline-dark" onclick="toggleDarkMode()">
        🌙 Toggle Dark Mode
    </button>
</div>

<div class="container py-3">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card form-card">

                <div class="form-header">
                    <h4 class="mb-0">➕ Add New Task</h4>
                    <small>Create and schedule your productivity</small>
                </div>

                <div class="card-body p-4">

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-success alert-dismissible fade show">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form method="post">
                        {% csrf_token %}

                        <!-- Title -->
                        <div class="mb-3">
                            <label class="form-label">Task Title</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-pen"></i></span>
                                <input type="text" name="title" class="form-control" required>
                            </div>
                        </div>

                        <!-- Description -->
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-align-left"></i></span>
                                <textarea name="description" class="form-control" rows="3"></textarea>
                            </div>
                        </div>

                        <!-- Priority -->
                        <div class="mb-3">
                            <label class="form-label">Priority</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-flag"></i></span>
                                <select name="priority" class="form-select">
                                    <option value="Low">Low</option>
                                    <option value="Medium">Medium</option>
                                    <option value="High">High</option>
                                </select>
                            </div>
                        </div>

                        <!-- Due Date -->
                        <div class="mb-3">
                            <label class="form-label">Due Date</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa-solid fa-calendar"></i></span>
                                <input type="date" name="due_date" class="form-control" required>
                            </div>
                        </div>

                        <!-- Recurrence -->
                        <div class="mb-3">
                            <label class="form-label">Recurrence</label>

                            <div class="recurrence-box">

                                <select name="recurrence" id="recurrenceSelect"
                                        class="form-select mb-3">
                                    <option value="None">One Time</option>
                                    <option value="Daily">Everyday</option>
                                    <option value="Weekdays">Weekdays</option>
                                    <option value="Weekend">Weekend</option>
                                    <option value="Custom">Custom</option>
                                </select>

                                <!-- Custom Days -->
                                <div id="customDays">
                                    <label class="form-label">Select Custom Days</label>
                                    <div class="d-flex flex-wrap gap-3">
                                        {% for day in days_list %}
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" name="days" value="{{ day }}">
                                                <label class="form-check-label">{{ day }}</label>
                                            </div>
                                        {% endfor %}
                                    </div>
                                </div>

                            </div>
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <a href="/" class="btn btn-outline-secondary">Cancel</a>
                            <button type="submit" class="btn btn-save text-white">Save Task</button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {

    const recurrenceSelect = document.getElementById("recurrenceSelect");
    const checkboxes = document.querySelectorAll("input[name='days']");

    const weekdays = ["Mon","Tue","Wed","Thu","Fri"];
    const weekend = ["Sat","Sun"];
    const allDays = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];


    // DROPDOWN → CHECKBOXES
    function toggleDaysFromDropdown() {
        const recurrence = recurrenceSelect.value;

        checkboxes.forEach(cb => cb.checked = false);

        if (recurrence === "Daily") {
            checkboxes.forEach(cb => cb.checked = true);
        }

        else if (recurrence === "Weekdays") {
            checkboxes.forEach(cb => {
                if (weekdays.includes(cb.value)) cb.checked = true;
            });
        }

        else if (recurrence === "Weekend") {
            checkboxes.forEach(cb => {
                if (weekend.includes(cb.value)) cb.checked = true;
            });
        }

        // Custom & None → do nothing (manual)
    }


    // CHECKBOXES → DROPDOWN
    function updateDropdownFromCheckboxes() {

        const selected = Array.from(checkboxes)
            .filter(cb => cb.checked)
            .map(cb => cb.value);

        if (selected.length === 0) {
            recurrenceSelect.value = "None";
            return;
        }

        // All 7 selected → Daily
        if (selected.length === 7) {
            recurrenceSelect.value = "Daily";
            return;
        }

        // Weekdays check
        if (
            selected.length === 5 &&
            weekdays.every(day => selected.includes(day))
        ) {
            recurrenceSelect.value = "Weekdays";
            return;
        }

        // Weekend check
        if (
            selected.length === 2 &&
            weekend.every(day => selected.includes(day))
        ) {
            recurrenceSelect.value = "Weekend";
            return;
        }

        // Otherwise → Custom
        recurrenceSelect.value = "Custom";
    }


    // EVENT LISTENERS
    recurrenceSelect.addEventListener("change", toggleDaysFromDropdown);

    checkboxes.forEach(cb => {
        cb.addEventListener("change", updateDropdownFromCheckboxes);
    });


    // DARK MODE (Persistent)
    function toggleDarkMode() {
        document.body.classList.toggle("dark-mode");

        if (document.body.classList.contains("dark-mode")) {
            localStorage.setItem("darkMode", "enabled");
        } else {
            localStorage.setItem("darkMode", "disabled");
        }
    }

    window.toggleDarkMode = toggleDarkMode;

    // Load saved theme
    if (localStorage.getItem("darkMode") === "enabled") {
        document.body.classList.add("dark-mode");
    }

    // Initialize once on load
    toggleDaysFromDropdown();
});
</script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
